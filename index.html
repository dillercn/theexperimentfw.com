<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>From Earth, With Love</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #08080f;
    color: #f0ece4;
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    overflow: hidden;
  }

  #starfield {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  .star {
    position: absolute;
    border-radius: 50%;
    background: #f0ece4;
    animation: twinkle var(--d) ease-in-out infinite;
    animation-delay: var(--delay);
    opacity: 0;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0; }
    50% { opacity: var(--max-op); }
  }

  #presents {
    position: fixed;
    top: clamp(24px, 5vh, 48px);
    left: 0; right: 0;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    font-size: clamp(8px, 0.9vw, 10px);
    letter-spacing: 0.4em;
    color: #f0ece4;
    opacity: 0.25;
    text-transform: uppercase;
    z-index: 10;
  }

  #center {
    position: fixed;
    inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  #ex {
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    font-size: clamp(9px, 1.2vw, 11px);
    letter-spacing: 0.4em;
    color: #c8924a;
    opacity: 0.7;
    margin-bottom: 1.6rem;
    text-transform: uppercase;
  }

  #title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(32px, 6vw, 72px);
    letter-spacing: 0.06em;
    color: #f0ece4;
    text-align: center;
    line-height: 1.15;
    margin-bottom: 4rem;
  }

  #title .line2 {
    display: block;
    font-style: italic;
    color: #c8924a;
    opacity: 0.85;
  }

  #pulse-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #c8924a;
    animation: pulse-beat 1.4s ease-in-out infinite;
  }

  @keyframes pulse-beat {
    0%   { transform: scale(1);   opacity: 0.9; }
    10%  { transform: scale(1.7); opacity: 1;   }
    20%  { transform: scale(1);   opacity: 0.9; }
    30%  { transform: scale(1.3); opacity: 1;   }
    40%  { transform: scale(1);   opacity: 0.85;}
    100% { transform: scale(1);   opacity: 0.9; }
  }

  #location {
    position: fixed;
    bottom: clamp(44px, 8vh, 72px);
    left: 0; right: 0;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    font-size: clamp(8px, 0.9vw, 10px);
    letter-spacing: 0.35em;
    color: #c8924a;
    opacity: 0.4;
    text-transform: uppercase;
    z-index: 10;
  }

  #tagline {
    position: fixed;
    bottom: clamp(24px, 4vh, 40px);
    left: 0; right: 0;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    font-size: clamp(8px, 0.9vw, 10px);
    letter-spacing: 0.3em;
    color: #f0ece4;
    opacity: 0.15;
    text-transform: uppercase;
    z-index: 10;
  }
</style>
</head>
<body>

<div id="starfield"></div>

<div id="presents">The Experiment presents</div>

<div id="center">
  <div id="ex">EX:001</div>
  <div id="title">
    From Earth,
    <span class="line2">With Love</span>
  </div>
  <div id="pulse-dot"></div>
</div>

<div id="location">Fort Worth, Texas &nbsp;&middot;&nbsp; August 2027</div>
<div id="tagline">theexperimentfw.com</div>

<script>
  const field = document.getElementById('starfield');
  const W = window.innerWidth, H = window.innerHeight;
  const count = Math.floor((W * H) / 5500);

  for (let i = 0; i < count; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() < 0.7 ? 1 : Math.random() < 0.8 ? 1.5 : 2;
    const dur = 3 + Math.random() * 6;
    const delay = Math.random() * 9;
    const maxOp = 0.15 + Math.random() * 0.5;
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${size}px;height:${size}px;--d:${dur}s;--delay:-${delay}s;--max-op:${maxOp};`;
    field.appendChild(s);
  }
</script>
</body>
</html>
